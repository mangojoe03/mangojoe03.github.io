<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Clicker Game</title>
    <style>
      body {
        background: violet;
        transition: background-color 0.5s ease;
      }

      button {
        padding: 15px 30px;
        font-size: 1.2em;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button onclick="addClick()">Click Me!</button>
    <button onclick="changeColor()">Change Background Color</button>
    <p id="clickcount">Clicks: 0</p>

    <script>
      let clicks = 0;
      const colors = ["#FF5733", "#33FF57", "#3357FF", "#FF33F5", "#F5FF33"];
      let colorIndex = 0;

      function addClick() {
        clicks++;
        document.getElementById("clickcount").innerHTML = "Clicks: " + clicks;
      }

      function changeColor() {
        document.body.style.backgroundColor = colors[colorIndex];
        colorIndex = (colorIndex + 1) % colors.length;
      }
    </script>
  </body>
</html>
